<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Vibe Tutor workflow</title>
  <desc id="desc">A workflow diagram showing how Vibe Tutor turns the latest git diff into a concise learning digest, self-check, and verification status.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f2a5f"/>
      <stop offset="1" stop-color="#1479d6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f2a5f" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1479d6"/>
    </marker>
    <style>
      .title { font: 800 76px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f2a5f; }
      .title-accent { fill: #1479d6; }
      .subtitle { font: 500 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4a6284; }
      .card-title { font: 800 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f2a5f; }
      .card-subtitle { font: 650 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #354a68; }
      .card-small { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6a7d99; }
      .lane-title { font: 800 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f2a5f; }
      .lane-small { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6a7d99; }
      .badge { font: 800 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .mono { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #0f2a5f; }
      .arrow { stroke: #1479d6; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #d7e6f7; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="48" y="48" width="1504" height="804" rx="34" fill="#ffffff" opacity="0.86"/>

  <text x="800" y="150" text-anchor="middle" class="title">
    Vibe <tspan class="title-accent">Tutor</tspan>
  </text>
  <text x="800" y="188" text-anchor="middle" class="subtitle">
    Diff-based just-in-time learning for agentic coding
  </text>

  <g filter="url(#shadow)">
    <g transform="translate(72 270)">
      <rect width="190" height="270" rx="18" fill="url(#card)" stroke="#bdd6f3" stroke-width="2"/>
      <circle cx="32" cy="0" r="18" fill="#1479d6"/>
      <text x="32" y="7" text-anchor="middle" class="badge">1</text>
      <text x="95" y="38" text-anchor="middle" class="card-title">Latest Diff</text>
      <rect x="48" y="82" width="92" height="72" rx="10" fill="#eef6ff" stroke="#1479d6" stroke-width="4"/>
      <line x1="62" y1="102" x2="126" y2="102" stroke="#0f2a5f" stroke-width="5" stroke-linecap="round"/>
      <line x1="62" y1="122" x2="114" y2="122" stroke="#1479d6" stroke-width="5" stroke-linecap="round"/>
      <line x1="62" y1="142" x2="132" y2="142" stroke="#8fb9e6" stroke-width="5" stroke-linecap="round"/>
      <circle cx="143" cy="154" r="24" fill="#ffffff" stroke="#1479d6" stroke-width="4"/>
      <line x1="160" y1="171" x2="178" y2="189" stroke="#1479d6" stroke-width="6" stroke-linecap="round"/>
      <text x="95" y="196" text-anchor="middle" class="card-subtitle">git diff + stat</text>
      <text x="95" y="226" text-anchor="middle" class="card-small">staged + unstaged</text>
      <text x="95" y="249" text-anchor="middle" class="card-small">changed files</text>
    </g>

    <g transform="translate(318 270)">
      <rect width="190" height="270" rx="18" fill="url(#card)" stroke="#bdd6f3" stroke-width="2"/>
      <circle cx="32" cy="0" r="18" fill="#1479d6"/>
      <text x="32" y="7" text-anchor="middle" class="badge">2</text>
      <text x="95" y="38" text-anchor="middle" class="card-title">Redact + Scope</text>
      <rect x="58" y="78" width="74" height="92" rx="9" fill="#eef6ff" stroke="#1479d6" stroke-width="4"/>
      <path d="M132 78 L154 100 L132 100 Z" fill="#d9ecff" stroke="#1479d6" stroke-width="4"/>
      <line x1="74" y1="106" x2="120" y2="106" stroke="#0f2a5f" stroke-width="5" stroke-linecap="round"/>
      <line x1="74" y1="127" x2="132" y2="127" stroke="#1479d6" stroke-width="5" stroke-linecap="round"/>
      <line x1="74" y1="148" x2="112" y2="148" stroke="#8fb9e6" stroke-width="5" stroke-linecap="round"/>
      <rect x="118" y="134" width="38" height="34" rx="8" fill="#ffffff" stroke="#16a36c" stroke-width="4"/>
      <path d="M127 134 C127 118 148 118 148 134" stroke="#16a36c" stroke-width="4" fill="none" stroke-linecap="round"/>
      <text x="95" y="196" text-anchor="middle" class="card-subtitle">redacted context</text>
      <text x="95" y="226" text-anchor="middle" class="card-small">skip risky files</text>
      <text x="95" y="249" text-anchor="middle" class="card-small">bounded hunks</text>
    </g>

    <g transform="translate(564 270)">
      <rect width="190" height="270" rx="18" fill="url(#card)" stroke="#bdd6f3" stroke-width="2"/>
      <circle cx="32" cy="0" r="18" fill="#1479d6"/>
      <text x="32" y="7" text-anchor="middle" class="badge">3</text>
      <text x="95" y="38" text-anchor="middle" class="card-title">Short Digest</text>
      <rect x="56" y="82" width="78" height="88" rx="10" fill="#eef6ff" stroke="#1479d6" stroke-width="4"/>
      <path d="M74 110 L86 122 L112 96" stroke="#1479d6" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="122" y1="111" x2="142" y2="111" stroke="#8fb9e6" stroke-width="5" stroke-linecap="round"/>
      <path d="M74 145 L86 157 L112 131" stroke="#1479d6" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="122" y1="146" x2="142" y2="146" stroke="#8fb9e6" stroke-width="5" stroke-linecap="round"/>
      <text x="95" y="196" text-anchor="middle" class="card-subtitle">under 150 words</text>
      <text x="95" y="226" text-anchor="middle" class="card-small">what changed</text>
      <text x="95" y="249" text-anchor="middle" class="card-small">why it matters</text>
    </g>

    <g transform="translate(810 270)">
      <rect width="190" height="270" rx="18" fill="url(#card)" stroke="#bdd6f3" stroke-width="2"/>
      <circle cx="32" cy="0" r="18" fill="#1479d6"/>
      <text x="32" y="7" text-anchor="middle" class="badge">4</text>
      <text x="95" y="38" text-anchor="middle" class="card-title">Concepts</text>
      <circle cx="95" cy="118" r="34" fill="#eef6ff" stroke="#1479d6" stroke-width="4"/>
      <path d="M82 114 C82 97 108 97 108 114 C108 124 101 129 101 137 L89 137 C89 129 82 124 82 114 Z" fill="#ffffff" stroke="#1479d6" stroke-width="4" stroke-linejoin="round"/>
      <line x1="88" y1="148" x2="102" y2="148" stroke="#1479d6" stroke-width="5" stroke-linecap="round"/>
      <line x1="90" y1="158" x2="100" y2="158" stroke="#8fb9e6" stroke-width="5" stroke-linecap="round"/>
      <line x1="72" y1="96" x2="66" y2="90" stroke="#8fb9e6" stroke-width="4" stroke-linecap="round"/>
      <line x1="118" y1="96" x2="124" y2="90" stroke="#8fb9e6" stroke-width="4" stroke-linecap="round"/>
      <line x1="95" y1="82" x2="95" y2="74" stroke="#8fb9e6" stroke-width="4" stroke-linecap="round"/>
      <text x="95" y="196" text-anchor="middle" class="card-subtitle">max 3 ideas</text>
      <text x="95" y="226" text-anchor="middle" class="card-small">repo-grounded</text>
      <text x="95" y="249" text-anchor="middle" class="card-small">no full course</text>
    </g>

    <g transform="translate(1056 270)">
      <rect width="190" height="270" rx="18" fill="url(#card)" stroke="#bdd6f3" stroke-width="2"/>
      <circle cx="32" cy="0" r="18" fill="#1479d6"/>
      <text x="32" y="7" text-anchor="middle" class="badge">5</text>
      <text x="95" y="38" text-anchor="middle" class="card-title">Self-Check</text>
      <rect x="58" y="82" width="74" height="92" rx="12" fill="#eef6ff" stroke="#1479d6" stroke-width="4"/>
      <rect x="74" y="104" width="20" height="20" rx="5" fill="#ffffff" stroke="#1479d6" stroke-width="4"/>
      <line x1="106" y1="114" x2="128" y2="114" stroke="#0f2a5f" stroke-width="5" stroke-linecap="round"/>
      <rect x="74" y="140" width="20" height="20" rx="5" fill="#ffffff" stroke="#16a36c" stroke-width="4"/>
      <path d="M78 150 L84 156 L94 144" stroke="#16a36c" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="106" y1="150" x2="128" y2="150" stroke="#0f2a5f" stroke-width="5" stroke-linecap="round"/>
      <text x="95" y="196" text-anchor="middle" class="card-subtitle">1 question</text>
      <text x="95" y="226" text-anchor="middle" class="card-small">tiny local exercise</text>
      <text x="95" y="249" text-anchor="middle" class="card-small">when safe</text>
    </g>

    <g transform="translate(1302 270)">
      <rect width="190" height="270" rx="18" fill="url(#card)" stroke="#bdd6f3" stroke-width="2"/>
      <circle cx="32" cy="0" r="18" fill="#1479d6"/>
      <text x="32" y="7" text-anchor="middle" class="badge">6</text>
      <text x="95" y="38" text-anchor="middle" class="card-title">Verification</text>
      <path d="M95 78 L143 96 L143 136 C143 164 122 180 95 190 C68 180 47 164 47 136 L47 96 Z" fill="#eef6ff" stroke="#1479d6" stroke-width="4"/>
      <path d="M72 130 L90 148 L121 111" stroke="#16a36c" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="95" y="210" text-anchor="middle" class="card-subtitle">honest status</text>
      <text x="95" y="236" text-anchor="middle" class="card-small">tests / lint / build</text>
      <text x="95" y="259" text-anchor="middle" class="card-small">or not verified</text>
    </g>
  </g>

  <path d="M270 405 L310 405" class="arrow"/>
  <path d="M516 405 L556 405" class="arrow"/>
  <path d="M762 405 L802 405" class="arrow"/>
  <path d="M1008 405 L1048 405" class="arrow"/>
  <path d="M1254 405 L1294 405" class="arrow"/>

  <rect x="560" y="710" width="480" height="32" rx="16" fill="url(#brand)" opacity="0.95"/>
  <text x="800" y="732" text-anchor="middle" style="font: 700 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #ffffff;">
    concise lessons from the code you are actually building
  </text>
</svg>
